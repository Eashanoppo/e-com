<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ridy's Hena Art — Supabase Migration Tool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #F5F3EC; display: flex; items-center: center; padding: 40px 20px; min-height: 100vh; align-items: flex-start; justify-content: center; }
  .card { background: white; border-radius: 24px; padding: 48px; max-width: 700px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
  h1 { color: #0F3D2E; font-size: 28px; margin-bottom: 8px; }
  p { color: #6B6B6B; font-size: 14px; margin-bottom: 32px; }
  button { background: #0F3D2E; color: white; border: none; padding: 16px 32px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; width: 100%; transition: background 0.2s; }
  button:hover { background: #C9A96E; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #log { background: #0F3D2E; color: #F5F3EC; padding: 24px; border-radius: 16px; font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; margin-top: 24px; display: none; line-height: 1.6; }
  .success { color: #4ade80; }
  .error { color: #f87171; }
  .info { color: #C9A96E; }
</style>
</head>
<body>
<div class="card">
  <h1>🌿 Ridy's Hena Art</h1>
  <p>Database Migration Tool — Creates the orders, products, and reviews tables in Supabase, then sets up Row-Level Security policies.</p>
  <button id="runBtn" onclick="runMigration()">▶ Create Supabase Tables</button>
  <div id="log"></div>
</div>

<script>
const SUPABASE_URL = "***REMOVED***";
const SERVICE_ROLE_KEY = "***REMOVED***";

const logEl = document.getElementById("log");
const btn = document.getElementById("runBtn");

function log(msg, type = "info") {
  logEl.style.display = "block";
  logEl.innerHTML += `<span class="${type}">${msg}</span>\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

async function supabaseQuery(sql) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/`, {
    method: "POST", 
    headers: {
      "Content-Type": "application/json",
      "apikey": SERVICE_ROLE_KEY,
      "Authorization": `Bearer ${SERVICE_ROLE_KEY}`,
      "Prefer": "return=minimal"
    },
    body: JSON.stringify({ query: sql })
  });
  return res;
}

async function checkTable(name) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${name}?limit=1`, {
    headers: { "apikey": SERVICE_ROLE_KEY, "Authorization": `Bearer ${SERVICE_ROLE_KEY}` }
  });
  return res.status;
}

async function runSQL(sql, label) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/query`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SERVICE_ROLE_KEY,
        "Authorization": `Bearer ${SERVICE_ROLE_KEY}`,
      },
      body: JSON.stringify({ sql })
    });
    const text = await res.text();
    if (res.ok || text.includes("already exists")) {
      log(`  ✅ ${label}: OK`, "success");
    } else {
      log(`  ⚠️  ${label}: ${text.substring(0, 120)}`, "error");
    }
  } catch (e) {
    log(`  ❌ ${label}: ${e.message}`, "error");
  }
}

async function runMigration() {
  btn.disabled = true;
  btn.textContent = "Running...";
  logEl.innerHTML = "";
  logEl.style.display = "block";

  log("🔍 Checking current table status...\n", "info");

  for (const t of ["orders", "products", "reviews"]) {
    const status = await checkTable(t);
    if (status === 200) {
      log(`  ✅ Table '${t}': already EXISTS`, "success");
    } else {
      log(`  ❌ Table '${t}': MISSING (${status})`, "error");
    }
  }

  log("\n🏗️  Creating tables...\n", "info");

  const tables = [
    ["orders", `CREATE TABLE IF NOT EXISTS public.orders (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, order_id TEXT UNIQUE NOT NULL, customer_name TEXT NOT NULL, phone TEXT NOT NULL, address TEXT NOT NULL, delivery_type TEXT NOT NULL DEFAULT 'Inside Dhaka', product_name TEXT NOT NULL, quantity INTEGER NOT NULL DEFAULT 1, total_price NUMERIC NOT NULL DEFAULT 0, status TEXT NOT NULL DEFAULT 'Verified', user_email TEXT, created_at TIMESTAMPTZ DEFAULT now())`],
    ["products", `CREATE TABLE IF NOT EXISTS public.products (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, name TEXT NOT NULL, description TEXT, price NUMERIC NOT NULL, offer_price NUMERIC, images TEXT[] DEFAULT '{}', variants JSONB DEFAULT '[]', is_active BOOLEAN DEFAULT true, created_at TIMESTAMPTZ DEFAULT now())`],
    ["reviews", `CREATE TABLE IF NOT EXISTS public.reviews (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, user_id TEXT NOT NULL, name TEXT NOT NULL, rating INTEGER NOT NULL DEFAULT 5, comment TEXT NOT NULL, created_at TIMESTAMPTZ DEFAULT now())`],
  ];

  for (const [name, sql] of tables) {
    // Try using supabase-js createTable approach via REST
    const res = await fetch(`${SUPABASE_URL}/rest/v1/`, {
      method: "GET",
      headers: { "apikey": SERVICE_ROLE_KEY, "Authorization": `Bearer ${SERVICE_ROLE_KEY}` }
    });
    log(`  ℹ️  Connection: ${res.status} ${res.statusText}`, "info");
    break;
  }

  log("\n💡 IMPORTANT: Supabase REST API does not support DDL (CREATE TABLE) directly.", "info");
  log("📋 Use the SQL below in your Supabase SQL Editor at:", "info");
  log("   https://supabase.com/dashboard/project/yjchubtrofikkijuyubx/sql/new\n", "info");

  log(`-- RUN THIS SQL IN SUPABASE DASHBOARD --\n\nCREATE TABLE IF NOT EXISTS public.orders (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  order_id TEXT UNIQUE NOT NULL,
  customer_name TEXT NOT NULL,
  phone TEXT NOT NULL,
  address TEXT NOT NULL,
  delivery_type TEXT NOT NULL DEFAULT 'Inside Dhaka',
  product_name TEXT NOT NULL,
  quantity INTEGER NOT NULL DEFAULT 1,
  total_price NUMERIC NOT NULL DEFAULT 0,
  status TEXT NOT NULL DEFAULT 'Verified',
  user_email TEXT,
  created_at TIMESTAMPTZ DEFAULT now()
);

CREATE TABLE IF NOT EXISTS public.products (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  name TEXT NOT NULL,
  description TEXT,
  price NUMERIC NOT NULL,
  offer_price NUMERIC,
  images TEXT[] DEFAULT '{}',
  variants JSONB DEFAULT '[]',
  is_active BOOLEAN DEFAULT true,
  created_at TIMESTAMPTZ DEFAULT now()
);

CREATE TABLE IF NOT EXISTS public.reviews (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id TEXT NOT NULL,
  name TEXT NOT NULL,
  rating INTEGER NOT NULL DEFAULT 5,
  comment TEXT NOT NULL,
  created_at TIMESTAMPTZ DEFAULT now()
);

ALTER TABLE public.orders ENABLE ROW LEVEL SECURITY;
ALTER TABLE public.products ENABLE ROW LEVEL SECURITY;
ALTER TABLE public.reviews ENABLE ROW LEVEL SECURITY;

CREATE POLICY "public_read_products" ON public.products FOR SELECT USING (true);
CREATE POLICY "service_all_products" ON public.products FOR ALL USING (true);
CREATE POLICY "public_insert_orders" ON public.orders FOR INSERT WITH CHECK (true);
CREATE POLICY "service_all_orders" ON public.orders FOR ALL USING (true);
CREATE POLICY "public_read_reviews" ON public.reviews FOR SELECT USING (true);
CREATE POLICY "public_insert_reviews" ON public.reviews FOR INSERT WITH CHECK (true);
CREATE POLICY "service_all_reviews" ON public.reviews FOR ALL USING (true);`, "success");

  log("\n✅ Copy the SQL above and paste it at the link above.", "success");
  btn.textContent = "Open Supabase Dashboard →";
  btn.disabled = false;
  btn.onclick = () => window.open("https://supabase.com/dashboard/project/yjchubtrofikkijuyubx/sql/new", "_blank");
}
</script>
</body>
</html>
